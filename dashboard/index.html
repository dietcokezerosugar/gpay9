<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPay Fleet Dashboard</title>
    <meta name="description" content="Real-time admin dashboard for managing GPay bot fleet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/morphdom@2.6.1/dist/morphdom-umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>

<body>
    <!-- Auth Wall -->
    <div id="auth-wall" class="auth-wall hidden">
        <div class="auth-card">
            <h2>GPAY FLEET</h2>
            <p>Admin Authentication Required</p>
            <form id="login-form">
                <div class="form-group">
                    <input type="text" id="admin-username" placeholder="USERNAME" required autocomplete="username" style="margin-bottom: 12px;">
                    <input type="password" id="admin-password" placeholder="PASSWORD" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">ACCESS SYSTEM</button>
                <div id="login-error" class="login-error hidden">❌ INVALID CREDENTIALS</div>
            </form>
        </div>
    </div>

    <!-- Sidebar Navigation -->
    <nav id="sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 256 218"><path fill="#EA4335" d="M232.504 42.169c-25.25-14.576-57.538-5.915-72.13 19.336l-36.782 63.717c-10.643 18.4 3.059 24.829 18.337 33.99l35.393 20.427c11.986 6.914 27.295 2.81 34.208-9.16l37.813-65.482c12.702-22.004 5.165-50.125-16.839-62.828Z"/><path fill="#FBBC04" d="m190.884 68.542l-35.393-20.428c-19.538-10.846-30.603-11.564-38.624 1.186l-52.201 90.404c-14.576 25.234-5.9 57.507 19.335 72.051c22.004 12.703 50.126 5.166 62.829-16.838l53.2-92.152c6.944-11.985 2.84-27.31-9.146-34.223Z"/><path fill="#34A853" d="M197.697 22.069L172.837 7.71C145.34-8.16 110.18 1.25 94.309 28.747l-47.332 81.976c-6.991 12.095-2.84 27.576 9.255 34.551l27.84 16.074c13.748 7.944 31.32 3.23 39.264-10.518l54.073-93.65c11.205-19.397 36.003-26.045 55.4-14.84l-35.112-20.272Z"/><path fill="#4285F4" d="M101.033 52.203L74.16 36.722c-11.985-6.898-27.294-2.81-34.207 9.145L7.71 101.579c-15.87 27.419-6.46 62.5 21.037 78.325l20.459 11.782L74.02 205.98l10.768 6.195c-19.117-12.796-25.188-38.436-13.5-58.63l8.35-14.42L110.209 86.3c6.898-11.923 2.794-27.2-9.176-34.098Z"/></svg>
            </div>
            <span class="brand-text">GPay Fleet</span>
        </div>
        <ul class="nav-links">
            <li><a href="#" data-page="overview" class="nav-link active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7" rx="1" />
                        <rect x="14" y="3" width="7" height="7" rx="1" />
                        <rect x="3" y="14" width="7" height="7" rx="1" />
                        <rect x="14" y="14" width="7" height="7" rx="1" />
                    </svg>
                    <span>Fleet Overview</span>
                </a></li>
            <li><a href="#" data-page="transactions" class="nav-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6" />
                    </svg>
                    <span>Transactions</span>
                </a></li>
            <li><a href="#" data-page="analytics" class="nav-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 20V10M12 20V4M6 20v-6" />
                    </svg>
                    <span>Analytics</span>
                </a></li>
            <li><a href="#" data-page="accounts" class="nav-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                    <span>Accounts</span>
                </a></li>
            <li><a href="#" data-page="logs" class="nav-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
                        <polyline points="14,2 14,8 20,8" />
                        <line x1="16" y1="13" x2="8" y2="13" />
                        <line x1="16" y1="17" x2="8" y2="17" />
                    </svg>
                    <span>Logs</span>
                </a></li>
            <li><a href="#" data-page="settings" class="nav-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3" />
                        <path
                            d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" />
                    </svg>
                    <span>Settings</span>
                </a></li>
        </ul>
        <div class="sidebar-footer">
            <div class="connection-status" id="wsStatus">
                <span class="status-dot disconnected"></span>
                <span>Disconnected</span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="main-content">
        <div id="page-content"></div>
    </main>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <script src="js/api.js"></script>
    <script src="js/websocket.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
